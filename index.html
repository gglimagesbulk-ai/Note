<!DOCTYPE html>
<html>
<head>
  <title>Prediction</title>

  <!-- Handwriting font -->
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Patrick Hand', cursive;

      /* Background (you can replace later with corkboard image) */
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Camera vignette */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.7));
      pointer-events: none;
    }

    .scene {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    .note {
      position: relative;
      width: 90vw;
      max-width: 420px;
      min-height: 300px;

      padding: 35px;

      background: linear-gradient(135deg, #ffe97a, #f4d94a);

      border-radius: 6px;

      box-shadow:
        0 30px 70px rgba(0,0,0,0.8),
        inset 0 0 10px rgba(0,0,0,0.2);

      transform: rotate(-5deg) perspective(800px) rotateX(6deg);

      overflow: visible;
    }

    /* Paper texture */
    .note::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
      opacity: 0.35;
      pointer-events: none;
    }

    /* Push pin */
    .pin {
      position: absolute;
      top: -35px;
      left: 50%;
      transform: translateX(-50%) rotate(8deg);

      width: 60px;

      filter: drop-shadow(0 10px 8px rgba(0,0,0,0.6));
      z-index: 10;
    }

    .text {
      font-size: 30px;
      line-height: 1.6;
      color: #111;
      word-break: break-word;
    }
  </style>
</head>

<body>

<div class="scene">
  <div class="note">
    <img src="https://raw.githubusercontent.com/gglimagesbulk-ai/Note/ae491431c8475e37dbda1e46cc62eda212ae52c0/pin.png" class="pin">
    <div class="text" id="noteText">Loading...</div>
  </div>
</div>

<script>
  const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0uRjvRTbPwGV8YUnru5eUYwjUm3v_lr8ixipRmabNOHjFI4Qs47YFFtoXZ_Qk1qc61IbUt7JhjNBD/pub?output=tsv";

  function handwritingEffect(text) {
    return text.split("").map(char => {
      const rot = (Math.random() * 4 - 2);
      const y = Math.random() * 2;
      return `<span style="display:inline-block; transform:rotate(${rot}deg) translateY(${y}px)">${char}</span>`;
    }).join("");
  }

  fetch(sheetUrl)
    .then(res => res.text())
    .then(data => {
      const rows = data.trim().split("\n").map(r => r.split("\t"));
      const prediction = rows[rows.length - 1][0];

      document.getElementById("noteText").innerHTML = handwritingEffect(prediction);
    })
    .catch(err => {
      console.error(err);
      document.getElementById("noteText").innerText = "Failed to load";
    });
</script>

</body>
</html>
