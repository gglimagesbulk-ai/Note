<!DOCTYPE html>
<html>
<head>
  <title>Prediction</title>

  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Patrick Hand', cursive;
      background: #1a1a1a;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* vignette effect */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.7));
      pointer-events: none;
    }

    .note {
      position: relative;

      width: 90vw;
      max-width: 420px;
      min-height: 320px;

      padding: 35px;

      background: linear-gradient(135deg, #ffe97a, #f4d94a);

      border-radius: 6px;

      box-shadow:
        0 30px 70px rgba(0,0,0,0.8),
        inset 0 0 10px rgba(0,0,0,0.2);

      transform: rotate(-2.5deg);

      overflow: visible;
    }

    .pin {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%) rotate(8deg);

      width: 55px;

      filter: drop-shadow(0 8px 6px rgba(0,0,0,0.6));
      z-index: 10;
    }

    .heading {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #111;
    }

    .text {
      font-size: 28px;
      line-height: 1.6;
      color: #111;
      word-break: break-word;
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body>

<div class="note">

  <img 
    src="https://raw.githubusercontent.com/gglimagesbulk-ai/Note/ae491431c8475e37dbda1e46cc62eda212ae52c0/pin.png"
    class="pin"
  >

  <div class="heading">Prediction:</div>

  <div class="text" id="noteText">Loading...</div>

</div>

<script>

  /*
    GOOGLE DOCS LINK FORMAT:

    1. Open Google Doc
    2. File → Share → Publish to web
    3. Copy publish link
    4. Add ?output=txt

    Example:
    https://docs.google.com/document/d/e/XXXX/pub?output=txt
	https://docs.google.com/document/d/1DFtL2TLZ7FrevGXk-kf5WSNX3o4-1JPkTG1_n46nIzU/edit?usp=sharing
  */

  const docUrl =
    "https://docs.google.com/document/d/e/2PACX-1vS1cjowXo0QGdcYaQPsVYGVY1AhBJvZNOj6dvfgVoLfKb_kDvGOY660U1WnrKDnGLLWkPhBLsL3V9lU/pub?output=txt";



  function handwritingEffect(text) {

    return text.split("").map(char => {

      // preserve spaces
      if (char === " ") return " ";

      // preserve line breaks
      if (char === "\n") return "<br>";

      const rot = (Math.random() * 4 - 2);
      const y = Math.random() * 2;

      return `
        <span
          style="
            display:inline-block;
            margin-right:1px;
            transform:
              rotate(${rot}deg)
              translateY(${y}px);
          "
        >
          ${char}
        </span>
      `;

    }).join("");
  }



  fetch(docUrl)
    .then(res => res.text())
    .then(text => {

      // remove extra empty spaces
      const prediction = text.trim();

      document.getElementById("noteText").innerHTML =
        handwritingEffect(prediction);

    })
    .catch(err => {

      console.error(err);

      document.getElementById("noteText").innerText =
        "Failed to load";

    });

</script>

</body>
</html>
