<!DOCTYPE html>
<html>
<head>
  <title>Prediction</title>

  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Patrick Hand', cursive;
      background: #1a1a1a;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.7));
    }

    .note {
      position: relative;
      width: 90vw;
      max-width: 420px;
      min-height: 320px;

      padding: 35px;

      background: linear-gradient(135deg, #ffe97a, #f4d94a);

      border-radius: 6px;

      box-shadow:
        0 30px 70px rgba(0,0,0,0.8),
        inset 0 0 10px rgba(0,0,0,0.2);

      transform: rotate(-2.5deg);

      overflow: visible;
    }


    .pin {
      position: absolute;
      top: -15px;   /* FIXED */
      left: 50%;
      transform: translateX(-50%) rotate(8deg);

      width: 55px;

      filter: drop-shadow(0 8px 6px rgba(0,0,0,0.6));
      z-index: 10;
    }

    .heading {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .text {
      font-size: 28px;
      line-height: 1.6;
      color: #111;
      word-break: break-word;
    }

  </style>
</head>

<body>

<div class="note">
  <img src="https://raw.githubusercontent.com/gglimagesbulk-ai/Note/ae491431c8475e37dbda1e46cc62eda212ae52c0/pin.png" class="pin">

  <!-- ✅ HEADING BACK -->
  <div class="heading">Prediction:</div>

  <div class="text" id="noteText"></div>
</div>

<script>
  const sheetUrl =
"https://docs.google.com/spreadsheets/d/1iKurhXy0H58z0MKlAVj_IZF_bwkGaWzDZU6rxjxnAeI/gviz/tq?tqx=out:json&t=" + new Date().getTime();
  function handwritingEffect(text) {
    return text.split("").map(char => {

      // ✅ FIX: PRESERVE SPACES
      if (char === " ") return " ";

      const rot = (Math.random() * 4 - 2);
      const y = Math.random() * 2;

      return `<span style="display:inline-block; margin-right:1px; transform:rotate(${rot}deg) translateY(${y}px)">${char}</span>`;
    }).join("");
  }

  fetch(sheetUrl)
  .then(res => res.text())
  .then(data => {

    // CLEAN GOOGLE RESPONSE SAFELY
    const jsonText = data.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/)[1];

    const json = JSON.parse(jsonText);

    // GET LAST ROW FIRST COLUMN
    const rows = json.table.rows;

    const prediction = rows[rows.length - 1].c[0].v;

    const note = document.getElementById("noteText");

    note.innerHTML = handwritingEffect(prediction);

    setTimeout(() => {
      note.style.opacity = 1;
      document.querySelector(".note").style.opacity = 1;
    }, 100);

  })
  .catch(err => {
    console.error(err);
  });
</script>

</body>
</html>
