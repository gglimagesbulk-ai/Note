<!DOCTYPE html>
<html>
<head>
  <title>Prediction</title>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    body {
      background: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Patrick Hand', cursive;
    }

    .card {
      background: linear-gradient(135deg, #fff59d, #f4e87c);
      padding: 40px;
      width: 85vw;
      max-width: 500px;
      min-height: 300px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
      transform: rotate(-3deg);
      border-radius: 5px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .heading {
      font-weight: bold;
      font-size: 36px; /* larger font */
      margin-bottom: 20px;
    }

    .value {
      font-size: 28px; /* dynamic value font size */
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="heading">Prediction</div>
    <div class="value" id="noteText">Loading...</div>
  </div>

  <script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0uRjvRTbPwGV8YUnru5eUYwjUm3v_lr8ixipRmabNOHjFI4Qs47YFFtoXZ_Qk1qc61IbUt7JhjNBD/pub?output=tsv";

    fetch(sheetUrl)
      .then(res => res.text())
      .then(data => {
        const rows = data.trim().split("\n").map(row => row.split("\t"));
        const prediction = rows[rows.length - 1][0]; // always latest value
        document.getElementById("noteText").innerText = prediction;
      })
      .catch(err => {
        console.error(err);
        document.getElementById("noteText").innerText = "Failed to load data";
      });
  </script>
</body>
</html>
